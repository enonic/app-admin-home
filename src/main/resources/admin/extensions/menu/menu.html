<div>
    <link rel="stylesheet" type="text/css" href="{{stylesUrl}}">
    <script type="module" src="{{jsUrl}}"></script>
    <script type="application/json" id="menu-config-json">{{{configAsJson}}}</script>
    <button id="menu-button" class="menu-button" style="display: none;" title="{{phrases.tooltipOpenMenu}}" aria-label="{{phrases.tooltipOpenMenu}}" aria-expanded="false" aria-controls="menu-panel">
        <svg class="menu-icon menu-icon-logo" xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 120 120" fill="none" aria-hidden="true"><path d="M61.3332 78.8174H52.3812L44.573 66.8814L36.7151 78.8174H28.0117L40.1467 61.1123L28.5091 44.0039H37.4611L44.7719 55.2934L52.1325 44.0039H60.8359L49.1982 61.0128L61.3332 78.8174Z" fill="currentColor"/><path d="M94.626 56.1389C94.626 64.1958 88.3596 68.3734 80.5514 68.3734H74.7326V78.8174H67.0736V44.0039H81.2974C89.6029 44.0039 94.626 48.9275 94.626 56.0394V56.1389ZM86.8676 56.2881V56.1886C86.8676 52.757 84.4803 50.9169 80.6509 50.9169H74.7326V61.5599H80.8001C84.6295 61.5599 86.8676 59.2721 86.8676 56.2881Z" fill="currentColor"/><path d="M120.007 69.7227C115.296 98.2834 90.1728 120.004 60.0039 120.004C29.835 120.004 4.71142 98.2834 0.000976562 69.7227H10.0254C14.6194 92.7211 35.1984 110.144 60.0039 110.145C84.8094 110.144 105.389 92.7211 109.983 69.7227H120.007ZM60.0039 0C90.1747 0.000129089 115.3 21.7227 120.008 50.2861H109.984C105.392 27.285 84.8114 9.8595 60.0039 9.85938C35.1964 9.85945 14.6162 27.285 10.0244 50.2861H0C4.70815 21.7227 29.8331 7.50718e-05 60.0039 0Z" fill="currentColor"/></svg>
        <svg class="menu-icon menu-icon-active" xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 30 30" fill="none" aria-hidden="true"><path d="M19.3614 9.28118C19.7363 8.90627 20.344 8.90627 20.7188 9.28118C21.0937 9.65609 21.0937 10.2638 20.7188 10.6387L16.3576 15.0001L20.7188 19.3613C21.0937 19.7363 21.0937 20.344 20.7188 20.7189C20.344 21.0938 19.7363 21.0937 19.3614 20.7189L15 16.3575L10.6387 20.7189C10.2638 21.0938 9.6561 21.0937 9.28119 20.7189C8.90627 20.344 8.90627 19.7363 9.28119 19.3613L13.6425 15.0001L9.28119 10.6387C8.90627 10.2638 8.90627 9.65608 9.28119 9.28118C9.65609 8.90627 10.2638 8.90627 10.6387 9.28118L15 13.6425L19.3614 9.28118Z" fill="currentColor"/><path d="M30.001 17.4316C28.8231 24.5721 22.5435 30.0029 15.001 30.0029C7.45842 30.0029 1.17886 24.5721 0.000976562 17.4316H2.50586C3.65457 23.1816 8.79927 27.5381 15.001 27.5381C21.2027 27.5381 26.3474 23.1816 27.4961 17.4316H30.001ZM15.001 0C22.5441 1.37334e-05 28.8247 5.43106 30.002 12.5723H27.4961C26.348 6.8217 21.2032 2.46486 15.001 2.46484C8.79876 2.46484 3.654 6.82169 2.50586 12.5723H0C1.17721 5.43105 7.45785 0 15.001 0Z" fill="currentColor"/></svg>
    </button>
    <nav id="menu-panel" class="menu-panel" role="navigation" aria-label="{{phrases.tooltipOpenMenu}}" style="display: none;">
        <div class="menu-background" aria-hidden="true"></div>
        <div id="menu-main-container" class="menu-main-container">
            <div class="menu-info-panel">
                <div class="menu-info-content">
                    <h1 class="menu-info-title">{{installation}}</h1>
                    <p class="menu-info-version">Enonic XP {{xpVersion}}</p>
                    <nav class="menu-info-links" aria-label="{{usefulLinksTitle}}">
                        <h2 class="menu-info-links-title">{{usefulLinksTitle}}</h2>
                        {{#usefulLinks}}
                        <a href="{{link}}" target="_blank" rel="noopener noreferrer" class="menu-info-link-row">
                            <img src="{{iconUrl}}" alt="" class="menu-info-link-icon">
                            <span class="menu-info-link-caption">{{caption}}</span>
                        </a>
                        {{/usefulLinks}}
                    </nav>
                </div>
            </div>

            <div class="menu-app-container">
                <div class="app-grid">
                    <a href="{{homeTool.url}}" class="app-tile{{#homeTool.isHomeApp}} home-app{{/homeTool.isHomeApp}}" title="{{homeTool.description}}" aria-description="{{homeTool.description}}">
                        <div class="app-tile-icon icon-dashboard"></div>
                        <span class="app-tile-name">{{homeTool.caption}}</span>
                    </a>
                    {{#adminTools}}
                    <a href="{{uri}}" class="app-tile" id="{{appId}}" title="{{description}}" aria-description="{{description}}">
                        <div class="app-tile-icon">{{#icon}}{{{icon}}}{{/icon}}</div>
                        <span class="app-tile-name">{{title}}</span>
                    </a>
                    {{/adminTools}}
                </div>
            </div>

        </div>
    </nav>
    <div class="avatar-container">
        <button id="avatar-button" class="avatar-button" type="button" title="{{user.displayName}}" aria-expanded="false" aria-haspopup="true" aria-controls="avatar-dropdown">{{userInitials}}</button>
        <div id="avatar-dropdown" class="avatar-dropdown" role="menu">
            <div class="avatar-dropdown-username">{{user.displayName}}</div>
            <a href="{{logoutUrl}}" class="avatar-dropdown-item" role="menuitem">{{phrases.linkLogout}}</a>
        </div>
    </div>
</div>
