<div>
    <link rel="stylesheet" type="text/css" href="{{stylesUrl}}">
    <script type="module" src="{{jsUrl}}"></script>
    <script type="application/json" id="menu-config-json">{{{configAsJson}}}</script>
    <button id="menu-button" class="menu-button" style="display: none;" title="{{phrases.tooltipOpenMenu}}" aria-label="{{phrases.tooltipOpenMenu}}" aria-expanded="false" aria-controls="menu-panel">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true"><path fill-rule="evenodd" clip-rule="evenodd" d="M0 1.5C0 0.67157 0.67157 0 1.5 0H4.5C5.32843 0 6 0.67157 6 1.5V4.5C6 5.32843 5.32843 6 4.5 6H1.5C0.67157 6 0 5.32843 0 4.5V1.5ZM7 1.5C7 0.67157 7.67157 0 8.5 0H11.5C12.3284 0 13 0.67157 13 1.5V4.5C13 5.32843 12.3284 6 11.5 6H8.5C7.67157 6 7 5.32843 7 4.5V1.5ZM1.5 7C0.67157 7 0 7.67157 0 8.5V11.5C0 12.3284 0.67157 13 1.5 13H4.5C5.32843 13 6 12.3284 6 11.5V8.5C6 7.67157 5.32843 7 4.5 7H1.5ZM7 8.5C7 7.67157 7.67157 7 8.5 7H11.5C12.3284 7 13 7.67157 13 8.5V11.5C13 12.3284 12.3284 13 11.5 13H8.5C7.67157 13 7 12.3284 7 11.5V8.5Z" fill="currentColor"/></svg>
    </button>
    <nav id="menu-panel" class="menu-panel" role="navigation" aria-label="{{phrases.tooltipOpenMenu}}" style="display: none;">
        <div class="menu-background" aria-hidden="true"></div>
        <div id="menu-main-container" class="menu-main-container">
            <div class="menu-info-panel">
                <div class="menu-info-content">
                    <h1 class="menu-info-title">{{installation}}</h1>
                    <p class="menu-info-version">Enonic XP {{xpVersion}}</p>
                    <nav class="menu-info-links" aria-label="{{usefulLinksTitle}}">
                        <h2 class="menu-info-links-title">{{usefulLinksTitle}}</h2>
                        {{#usefulLinks}}
                        <a href="{{link}}" target="_blank" rel="noopener noreferrer" class="menu-info-link-row">
                            <img src="{{iconUrl}}" alt="" class="menu-info-link-icon">
                            <span class="menu-info-link-caption">{{caption}}</span>
                        </a>
                        {{/usefulLinks}}
                    </nav>
                </div>
            </div>

            <div class="menu-app-container">
                <div class="app-grid">
                    <a href="{{homeTool.url}}" class="app-tile{{#homeTool.isHomeApp}} home-app{{/homeTool.isHomeApp}}" title="{{homeTool.description}}" aria-description="{{homeTool.description}}">
                        <div class="app-tile-icon icon-dashboard"></div>
                        <span class="app-tile-name">{{homeTool.caption}}</span>
                    </a>
                    {{#adminTools}}
                    <a href="{{uri}}" class="app-tile" id="{{appId}}" title="{{description}}" aria-description="{{description}}">
                        <div class="app-tile-icon">{{#icon}}{{{icon}}}{{/icon}}</div>
                        <span class="app-tile-name">{{title}}</span>
                    </a>
                    {{/adminTools}}
                </div>
            </div>

        </div>
    </nav>
    <div class="avatar-container">
        <button id="avatar-button" class="avatar-button" type="button" title="{{user.displayName}}" aria-expanded="false" aria-haspopup="true" aria-controls="avatar-dropdown">{{userInitials}}</button>
        <div id="avatar-dropdown" class="avatar-dropdown" role="menu">
            <div class="avatar-dropdown-username">{{user.displayName}}</div>
            <a href="{{logoutUrl}}" class="avatar-dropdown-item" role="menuitem">{{phrases.linkLogout}}</a>
        </div>
    </div>
</div>
