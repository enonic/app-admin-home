<div>
    <link rel="stylesheet" type="text/css" href="{{stylesUrl}}">
    <script type="module" src="{{jsUrl}}"></script>
    <script type="application/json" id="menu-config-json">{{{configAsJson}}}</script>
    <button id="menu-button" class="menu-button" style="display: none;" title="{{phrases.tooltipOpenMenu}}" aria-label="{{phrases.tooltipOpenMenu}}" aria-expanded="false" aria-controls="menu-panel">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="7" height="7" x="3" y="3" rx="1"></rect><rect width="7" height="7" x="14" y="3" rx="1"></rect><rect width="7" height="7" x="14" y="14" rx="1"></rect><rect width="7" height="7" x="3" y="14" rx="1"></rect></svg>
    </button>
    <nav id="menu-panel" class="menu-panel" role="navigation" aria-label="{{phrases.tooltipOpenMenu}}" tabindex="0" style="display: none;">
        <div id="menu-main-container" class="menu-main-container">
            <div class="menu-title">
                <span class="container-title">{{installation}}</span>
            </div>

            <div class="menu-app-container">
                <div class="scrollable-content">
                    <a href="{{homeTool.url}}" target="_blank" class="{{homeTool.linkCls}}">
                        <div class="app-row{{homeTool.rowCls}}">
                            <div class="app-icon icon-dashboard"></div>
                            <div class="app-info">
                                <p class="app-name">{{homeTool.caption}}</p>

                                <p class="app-description">{{homeTool.description}}</p>
                            </div>
                        </div>
                    </a>
                    {{#adminTools}}
                    <a href="{{uri}}" target="_blank" data-id="{{appId}}">
                        <div class="app-row {{cls}}" id="{{appId}}">
                            <div class="app-icon">{{#icon}}{{{icon}}}{{/icon}}</div>
                            <div class="app-info">
                                <p class="app-name">{{displayName}}</p>

                                <p class="app-description">{{#description}}{{description}}{{/description}}</p>
                            </div>
                        </div>
                    </a>
                    {{/adminTools}}
                </div>

            </div>

            <div class="menu-user">
                <div class="user-logout">
                    <a href="{{logoutUrl}}">{{phrases.linkLogout}}</a>
                </div>
                <div class="user-info">
                    <img src="{{userIconUrl}}">
                    <p>{{user.displayName}}</p>
                </div>
            </div>
        </div>
    </nav>
</div>
